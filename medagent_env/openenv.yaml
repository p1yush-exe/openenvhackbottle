name: medagent
version: "0.1.0"
description: >
  Medical clinical assessment environment with three task families of increasing difficulty:
  vital signs triage (easy), NEWS2 score calculation (medium), and renal dose adjustment (hard).
  Each task is graded deterministically with partial-credit reward signals.
server:
  entrypoint: "server.app:app"
  port: 8000
hf_space: medagent-env
runtime:
  vcpu: 2
  memory: 8gb
  max_episode_steps: 14
tasks:
  - name: vital_triage
    difficulty: easy
    description: >
      Assess vital signs and classify the patient as stable, concerning, or critical.
  - name: news2_score
    difficulty: medium
    description: >
      Calculate the National Early Warning Score 2 (NEWS2) total from patient vitals.
  - name: medication_dosing
    difficulty: hard
    description: >
      Determine appropriate antibiotic renal dose adjustment based on eGFR and drug rules.
